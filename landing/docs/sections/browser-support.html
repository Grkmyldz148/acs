
    <section id="browser-support">

        <a href="https://developer.mozilla.org/en-US/docs/Web/API/Web_Audio_API" target="_blank" rel="noopener">Web Audio API</a> —
        Chrome, Firefox, Safari ≥ 14, Edge.
      </p>
