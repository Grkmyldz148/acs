<?xml version="1.0" encoding="UTF-8"?>
<!--
  ACS — Audio Cascading Style Sheets
  Pentagon shield logo modeled exactly on the W3C CSS3 / HTML5 badges:
  same outer shape, same inner right-half highlight, same two-tone
  wordmark (left half dimmer, right half pure-white) for the "engraved"
  look. Zinc palette — no blue accent, per project brand.

  This file is a STANDALONE asset (footer download link). All colors
  are hardcoded — no CSS custom properties — so it renders correctly
  outside the page context.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>ACS — Audio Cascading Style Sheets</title>

  <!-- Outer shield (path identical to CSS3 logo) -->
  <path fill="#18181b" d="M71.357 460.819L30.272 0h451.456l-41.129 460.746L255.724 512z"/>

  <!-- Inner right-half highlight (path identical to CSS3 logo) -->
  <path fill="#27272a" d="M405.388 431.408l35.148-393.73H256v435.146z"/>

  <!-- Clip the wordmark into left/right halves so each side can take a
       distinct fill, mimicking the CSS3/HTML5 two-tone effect. -->
  <defs>
    <clipPath id="acs-half-l"><rect x="0"   y="0" width="256" height="512"/></clipPath>
    <clipPath id="acs-half-r"><rect x="256" y="0" width="256" height="512"/></clipPath>
  </defs>

  <!-- Tagline "audio" (top-left, small, letter-spaced) -->
  <g font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif"
     font-weight="600" font-size="46" letter-spacing="3">
    <text x="60" y="170" fill="#a1a1aa" clip-path="url(#acs-half-l)">audio</text>
    <text x="60" y="170" fill="#fafafa" clip-path="url(#acs-half-r)">audio</text>
  </g>

  <!-- Wordmark "ACS" (large, bottom) -->
  <g font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif"
     font-weight="900" font-size="200" letter-spacing="-9">
    <text x="60" y="410" fill="#d4d4d8" clip-path="url(#acs-half-l)">ACS</text>
    <text x="60" y="410" fill="#fafafa" clip-path="url(#acs-half-r)">ACS</text>
  </g>
</svg>
