name: Mirror skills to acs-skills

# Mirror this repo's `skills/` folder into `Grkmyldz148/acs-skills` as a
# Claude Code plugin. Anyone can install both bundled skills with:
#
#   /plugin marketplace add Grkmyldz148/acs-skills
#   /plugin install acs-skills@acs-skills
#
# Layout produced in the mirror:
#
#   acs-skills/
#   ├── .claude-plugin/
#   │   ├── plugin.json        (plugin manifest)
#   │   └── marketplace.json   (single-plugin marketplace pointing at this repo)
#   ├── skills/
#   │   ├── create-acs-sound/  (mirrored from source skills/create-acs-sound/)
#   │   └── acs-soundscape/    (mirrored from source skills/acs-soundscape/)
#   └── README.md
#
# Adding a new `skills/<name>/` folder in the source automatically appears
# in the mirror on the next push — no workflow change needed.
#
# The workflow rebuilds each skill's SKILL.md before mirroring so the
# mirror always has a fresh index even if the author forgot to run
# build.mjs locally before committing.
#
# Auth: SSH deploy key whose private half is the `MIRROR_SSH_KEY` secret
# on this repo. Public half is registered (read-write) on the mirror's
# deploy keys page. No PAT, no token rotation, scope is exactly one repo.
#
# History on the mirror is intentionally one snapshot per push — we don't
# reproduce the source's commit graph. Tags and old commits stay in the
# source; the mirror is just the latest tree.

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - ".github/workflows/mirror-skill.yml"
  workflow_dispatch:

concurrency:
  group: mirror-skill
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild every skill's SKILL.md
        run: |
          set -euo pipefail
          for skill in skills/*/; do
            if [ -f "${skill}src/build.mjs" ]; then
              echo "[rebuild] ${skill}SKILL.md"
              node "${skill}src/build.mjs"
            fi
          done

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Mirror to acs-skills as a Claude Code plugin
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          git clone --depth=1 git@github.com:Grkmyldz148/acs-skills.git "$WORK"
          cd "$WORK"

          # Wipe everything except .git so deletions in source propagate.
          find . -mindepth 1 -maxdepth 1 -not -name ".git" -exec rm -rf {} +

          # Plugin metadata at the root — this is what makes the repo
          # discoverable as a Claude Code plugin + marketplace.
          if [ -d "$GITHUB_WORKSPACE/skills/.claude-plugin" ]; then
            mkdir -p .claude-plugin
            cp -R "$GITHUB_WORKSPACE/skills/.claude-plugin/." .claude-plugin/
          fi

          # Each skill goes under skills/<name>/ — Claude Code's plugin
          # loader auto-discovers SKILL.md files there.
          mkdir -p skills
          skill_list=""
          for skill_dir in "$GITHUB_WORKSPACE"/skills/*/; do
            name=$(basename "$skill_dir")
            # Skip plugin metadata, dotfiles, and anything that isn't a real skill.
            [[ "$name" == ".claude-plugin" ]] && continue
            [[ "$name" == .* ]] && continue
            mkdir -p "skills/$name"
            cp -R "$skill_dir". "skills/$name/"
            skill_list+="- \`$name\` — see [\`skills/$name/SKILL.md\`](skills/$name/SKILL.md)"$'\n'
          done

          # Top-level README pointing back to source + how to install.
          cat > README.md <<EOF
          # acs-skills

          Skills for **Audio Cascading Style Sheets** (ACS). Auto-generated
          mirror of [\`Grkmyldz148/acs\`](https://github.com/Grkmyldz148/acs)'s
          \`skills/\` folder.

          ## Bundled skills

          $skill_list

          ## Install — Claude Code (native plugin)

          \`\`\`
          /plugin marketplace add Grkmyldz148/acs-skills
          /plugin install acs-skills@acs-skills
          \`\`\`

          Lands in \`~/.claude/plugins/\`. Both skills become invokable as
          \`/create-acs-sound\` and \`/acs-soundscape\` immediately. Future
          skills added to the source repo arrive via
          \`/plugin update acs-skills\`.

          ## Install — any agent runtime (\`npx skills\`)

          \`\`\`bash
          npx skills add Grkmyldz148/acs-skills
          \`\`\`

          Uses the [\`skills\`](https://www.npmjs.com/package/skills) CLI
          (vercel-labs). Picks the runtime interactively (Claude Code, Cursor,
          Codex, OpenCode, 50+ supported), shows a multi-select picker so you
          can install both skills in one go or just the one you need.

          ## Updating

          **Do not commit here.** Changes pushed directly to this repo are
          overwritten on the next mirror sync. Open PRs against the source repo
          (\`Grkmyldz148/acs\`) under \`skills/<skill-name>/\`; merging to
          \`main\` triggers a re-mirror within seconds.

          ---

          Last sync: \`${SOURCE_SHA::7}\`
          EOF

          git config user.name  "acs-skill-mirror[bot]"
          git config user.email "acs-skill-mirror@audiocss.dev"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to mirror."
            exit 0
          fi
          git commit -m "Mirror Grkmyldz148/acs@${SOURCE_SHA::7}"
          git push origin HEAD:main
