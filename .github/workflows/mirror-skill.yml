name: Mirror skills to acs-skills

# Whenever any skill under `skills/` changes on `main`, push a snapshot to
# `Grkmyldz148/acs-skills` (root). That mirror repo is what users install
# via:
#   npx skills add Grkmyldz148/acs-skills/<skill-name>
#
# Layout in the mirror is one subfolder per skill:
#   acs-skills/
#     create-acs-sound/  → mirrors source skills/create-acs-sound/
#     acs-soundscape/    → mirrors source skills/acs-soundscape/
# Adding a new skills/<name>/ folder in the source automatically gets
# mirrored on the next push — no workflow change needed.
#
# The workflow rebuilds each skill's SKILL.md before mirroring, so the
# mirror is always fresh even if the author forgot to run build.mjs
# locally before committing.
#
# Auth: SSH deploy key whose private half is the `MIRROR_SSH_KEY` secret
# on this repo. Public half is registered (read-write) on the mirror's
# deploy keys page. No PAT, no token rotation, scope is exactly one repo.
#
# History on the mirror is intentionally one snapshot per push — we don't
# reproduce the source's commit graph. Tags and old commits stay in the
# source; the mirror is just the latest tree.

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - ".github/workflows/mirror-skill.yml"
  workflow_dispatch:

concurrency:
  group: mirror-skill
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild every skill's SKILL.md
        run: |
          set -euo pipefail
          for skill in skills/*/; do
            if [ -f "${skill}src/build.mjs" ]; then
              echo "[rebuild] ${skill}SKILL.md"
              node "${skill}src/build.mjs"
            fi
          done

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Mirror skills/ folder tree to acs-skills
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          git clone --depth=1 git@github.com:Grkmyldz148/acs-skills.git "$WORK"
          cd "$WORK"

          # Wipe everything except .git so deletions in source propagate.
          find . -mindepth 1 -maxdepth 1 -not -name ".git" -exec rm -rf {} +

          # Copy each skill as its own subfolder. Loop is forward-compatible —
          # adding skills/<new>/ in source automatically appears here.
          skill_list=""
          for skill in "$GITHUB_WORKSPACE"/skills/*/; do
            name=$(basename "$skill")
            mkdir -p "$name"
            cp -R "$skill". "$name/"
            skill_list+="- \`$name\` — see [\`$name/SKILL.md\`]($name/SKILL.md)"$'\n'
          done

          # Top-level README pointing back to source + listing skills.
          cat > README.md <<EOF
          # acs-skills

          Auto-generated mirror of [\`Grkmyldz148/acs\`](https://github.com/Grkmyldz148/acs)'s
          \`skills/\` folder. Each subfolder is one Claude skill ready to install.

          ## Skills

          $skill_list

          ## Install

          \`\`\`bash
          npx skills add Grkmyldz148/acs-skills/<skill-name>
          \`\`\`

          ## Updating

          **Do not commit here.** Changes pushed directly to this repo are
          overwritten on the next mirror sync. Open PRs against the source repo
          (\`Grkmyldz148/acs\`) under \`skills/<skill-name>/\`; merging to
          \`main\` triggers a re-mirror within seconds.

          ---

          Last sync: \`${SOURCE_SHA::7}\`
          EOF

          git config user.name  "acs-skill-mirror[bot]"
          git config user.email "acs-skill-mirror@audiocss.dev"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to mirror."
            exit 0
          fi
          git commit -m "Mirror Grkmyldz148/acs@${SOURCE_SHA::7}"
          git push origin HEAD:main
